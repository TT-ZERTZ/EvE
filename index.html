<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EvE - OvO Inspired Platformer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>EvE</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <div class="touch-controls">
        <div class="btn-group">
            <div class="touch-btn" id="btnLeft">←</div>
            <div class="touch-btn" id="btnRight">→</div>
        </div>
        <div class="btn-group">
            <div class="touch-btn" id="btnDown">↓</div>
            <div class="touch-btn" id="btnUp">↑</div>
        </div>
    </div>

    <div class="instructions">
        Desktop: WASD / Arrows | Mobile: On-Screen Buttons<br>
        <strong>Tip:</strong> Slide, then jump immediately to cross the Level 2 gap!
    </div>

    <script src="game.js"></script>
</body>
</html>
